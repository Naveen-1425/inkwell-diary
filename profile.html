<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Profile — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15171F">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Inkwell">
</head>
<body>
<main class="main" style="max-width:640px;">
  <div class="topbar"><div><h1>Profile</h1><p class="subtitle">Manage your account.</p></div></div>
  <div class="card" style="margin-bottom:16px;">
    <h2 style="font-size:1rem;margin-bottom:16px;">Your details</h2>
    <form id="profile-form">
      <div class="field"><label for="name">Full name</label><input type="text" id="name"></div>
      <div class="field"><label for="email">Email</label><input type="email" id="email" disabled></div>
      <div class="field"><label for="bio">Bio</label><textarea id="bio" placeholder="A line about your journaling goals..." style="min-height:72px;"></textarea></div>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </form>
  </div>
  <div class="card" style="margin-bottom:16px;">
    <h2 style="font-size:1rem;margin-bottom:16px;">Theme</h2>
    <div class="theme-toggle">
      <button data-theme-btn="midnight">🌙 Midnight</button>
      <button data-theme-btn="paper">☀️ Paper</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px;">
    <h2 style="font-size:1rem;margin-bottom:16px;">Change password</h2>
    <form id="password-form">
      <div class="field"><label for="new-password">New password</label><input type="password" id="new-password" minlength="8" placeholder="At least 8 characters"></div>
      <button type="submit" class="btn btn-ghost">Update password</button>
    </form>
  </div>
  <div class="card" style="margin-bottom:16px;">
    <h2 style="font-size:1rem;margin-bottom:10px;">Export journal</h2>
    <p style="color:var(--ink-soft);font-size:.86rem;margin-bottom:14px;">Download all your entries as a plain text file.</p>
    <button class="btn btn-ghost" id="export-btn">Export as .txt</button>
  </div>
  <div class="card" style="border-color:var(--danger);">
    <h2 style="font-size:1rem;margin-bottom:8px;color:var(--danger);">Danger zone</h2>
    <p style="color:var(--ink-soft);font-size:.86rem;margin-bottom:14px;">Permanently deletes all your entries and your account.</p>
    <button class="btn btn-danger" id="delete-account-btn">Delete account</button>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/shell.js"></script>
<script src="js/profile.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
