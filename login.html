<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Log in — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15171F">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Inkwell">
</head>
<body>
<div class="auth-shell">
  <div class="card auth-card">
    <p class="eyebrow">Inkwell</p>
    <h1>Welcome back</h1>
    <p class="lead">Good to see you again.</p>
    <form id="login-form">
      <div class="field"><label for="email">Email</label><input type="email" id="email" required placeholder="you@example.com" autocomplete="email"></div>
      <div class="field"><label for="password">Password</label><input type="password" id="password" required placeholder="Your password" autocomplete="current-password"></div>
      <div style="text-align:right;margin-bottom:18px;"><a href="forgot-password.html" style="font-size:.84rem;color:var(--brass);font-weight:600;">Forgot password?</a></div>
      <p class="error-text" id="form-error"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;">Sign in</button>
    </form>
    <p class="auth-foot">New here? <a href="signup.html">Create an account</a></p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>initTheme(); redirectIfAuthed(); initLoginForm();</script>
</body>
</html>
