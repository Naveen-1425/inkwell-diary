<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#15171F">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inkwell">
</head>
<body>

<main class="main">
  <div class="topbar">
    <div>
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <h1 id="greeting">Good morning 👋</h1>
      <p class="subtitle" id="greeting-sub">Loading your journal...</p>
    </div>
    <a href="entry.html" class="btn btn-primary">+ New Entry</a>
  </div>

  <div class="stat-grid" id="stat-grid">
    <div class="card stat-card"><div class="skeleton" style="height:32px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:80%;"></div></div>
    <div class="card stat-card"><div class="skeleton" style="height:32px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:80%;"></div></div>
    <div class="card stat-card"><div class="skeleton" style="height:32px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:80%;"></div></div>
    <div class="card stat-card"><div class="skeleton" style="height:32px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:80%;"></div></div>
  </div>

  <div class="card">
    <div class="topbar" style="margin-bottom:8px;">
      <h2 style="font-size:1.15rem;">Recent entries</h2>
      <a href="search.html" style="font-size:.85rem;color:var(--brass);font-weight:600;">View all →</a>
    </div>
    <div id="recent-entries">
      <div class="skeleton" style="height:60px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:60px;margin-bottom:10px;"></div>
      <div class="skeleton" style="height:60px;"></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/shell.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
