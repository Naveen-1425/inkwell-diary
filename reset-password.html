<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>New password — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15171F">
</head>
<body>
<div class="auth-shell">
  <div class="card auth-card">
    <p class="eyebrow">Inkwell</p>
    <h1>Choose a new password</h1>
    <p class="lead">Make it something you'll remember.</p>
    <form id="reset-form">
      <div class="field"><label for="password">New password</label><input type="password" id="password" required minlength="8" placeholder="At least 8 characters"></div>
      <div class="field"><label for="confirm-password">Confirm</label><input type="password" id="confirm-password" required minlength="8" placeholder="Repeat"></div>
      <p class="error-text" id="form-error"></p>
      <button type="submit" class="btn btn-primary" style="width:100%;">Update password</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>initTheme(); initResetForm();</script>
</body>
</html>
