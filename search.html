<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#15171F">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inkwell">
</head>
<body>

<main class="main">
  <div class="topbar">
    <div>
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <h1>Search your journal</h1>
      <p class="subtitle">Find any entry by title, content, tag, or mood.</p>
    </div>
  </div>

  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search entries...">
  </div>
  <div class="search-bar" id="filter-chips">
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="favorites">Favorites</button>
    <button class="filter-chip" data-filter="archived">Archived</button>
  </div>
  <div class="search-bar" id="category-chips"></div>

  <div class="card">
    <div id="results"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/shell.js"></script>
<script src="js/search.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
