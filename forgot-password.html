<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Inkwell</title>
<link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#15171F">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Inkwell">
</head>
<body>
<div class="auth-shell">
  <div class="card auth-card">
    <p class="eyebrow">Inkwell</p>
    <h1>Reset your password</h1>
    <p class="lead">We'll email you a link to set a new one.</p>

    <form id="forgot-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Send reset link</button>
    </form>

    <p class="auth-foot"><a href="login.html">Back to log in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  initTheme();
  initForgotForm();
</script>
</body>
</html>
